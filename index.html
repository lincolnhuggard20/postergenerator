<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resident Daily Needs Poster Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1B2A5B;
    --blue-bg: #E8EFFB;
    --green-bg: #E9F3EA;
    --orange-bg: #FDF0DE;
    --lavender-bg: #EFEBF8;
    --green-text: #3C7A46;
    --orange-text: #C4831F;
    --lavender-text: #6B4FA0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
    background: #eef0f2;
    margin: 0;
    padding: 24px;
    color: var(--navy);
  }
  .app { max-width: 900px; margin: 0 auto; }
  .panel {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  h1 { font-size: 22px; margin: 0 0 4px; font-family: 'Nunito', sans-serif; }
  .sub { color: #666; font-size: 14px; margin-bottom: 16px; }
  label { display: block; font-weight: 700; font-size: 13px; margin: 12px 0 4px; }
  select, input[type=file] {
    width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px;
  }
  button {
    background: var(--navy); color: #fff; border: none; padding: 10px 18px;
    border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 14px; margin-right: 8px;
  }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .status { font-size: 13px; margin-top: 10px; }
  .status.ok { color: #2F6B3A; }
  .status.err { color: #b3261e; }

  /* Poster */
  #poster-wrap { display: flex; justify-content: center; }
  .poster {
    width: 720px; background: #fff; border: 3px solid var(--navy);
    border-radius: 18px; padding: 34px 38px 26px;
  }
  .title-row {
    display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 2px;
  }
  .poster h2 {
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 54px;
    margin: 0; color: var(--navy);
  }
  .poster .who {
    text-align: center; font-weight: 700; font-size: 14px; color: var(--navy);
    margin-bottom: 16px; opacity: 0.85;
  }
  .ribbon {
    position: relative; background: var(--navy); color: #fff; text-align: center;
    font-family: 'Caveat', cursive; font-weight: 700; font-size: 24px;
    padding: 10px 30px; margin: 0 0 24px;
    clip-path: polygon(0% 0%, 100% 0%, 92% 50%, 100% 100%, 0% 100%, 8% 50%);
  }
  .card {
    display: flex; align-items: flex-start; gap: 16px;
    border-radius: 16px; padding: 16px 20px; margin-bottom: 14px;
  }
  .card .icon-circle {
    width: 54px; height: 54px; border-radius: 50%; background: rgba(255,255,255,0.65);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .card .icon-circle svg { width: 30px; height: 30px; }
  .card h3 {
    margin: 0 0 8px; font-size: 16px; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .card ul { margin: 0; padding: 0; list-style: none; }
  .card li {
    font-weight: 600; font-size: 14.5px; margin-bottom: 6px; padding-bottom: 6px;
    border-bottom: 1px dashed rgba(27,42,91,0.18); display: flex; align-items: center; gap: 8px;
  }
  .card li:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .card li::before { content: "✓"; font-weight: 800; font-size: 12px; }
  .card.blue { background: var(--blue-bg); }
  .card.green { background: var(--green-bg); }
  .card.orange { background: var(--orange-bg); }
  .card.lavender { background: var(--lavender-bg); }
  .card.green h3, .card.green li { color: var(--green-text); }
  .card.orange h3, .card.orange li { color: var(--orange-text); }
  .card.lavender h3, .card.lavender li { color: var(--lavender-text); }
  .card.blue h3, .card.blue li { color: var(--navy); }

  .footer-thanks {
    text-align: center; font-family: 'Caveat', cursive; font-weight: 700;
    font-size: 22px; margin-top: 14px; color: var(--navy);
  }

  @media print {
    body { background: #fff; padding: 0; }
    .panel, .no-print { display: none !important; }
    #poster-wrap { display: block; }
    .poster { border: none; width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="panel no-print">
    <h1>Resident Daily Needs Poster Generator</h1>
    <div class="sub">Load a CSV export of the Master sheet from CareSummaryDashboard.xlsx. Nothing leaves your browser — this all runs locally.</div>

    <label>1. Choose CSV file (export the "Master" tab as CSV first)</label>
    <input type="file" id="csvFile" accept=".csv">
    <div id="loadStatus" class="status"></div>

    <label>2. Wing</label>
    <select id="wingSelect" disabled><option>Load a CSV first</option></select>

    <label>3. Resident</label>
    <select id="residentSelect" disabled><option>Load a CSV first</option></select>

    <button id="printBtn" disabled onclick="window.print()">Print / Save as PDF</button>
  </div>

  <div id="poster-wrap"></div>

</div>

<script>
const ICONS = {
  toilet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h8a1 1 0 0 1 1 1v4H6V4a1 1 0 0 1 1-1z"/><path d="M6 8h10l-1 3.5a3 3 0 0 1-3 2.5h-2a3 3 0 0 1-3-2.5L6 8z"/><path d="M9 14v3a3 3 0 0 0 6 0v-3"/><path d="M8 21h8"/></svg>`,
  glasses: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="14" r="3.2"/><circle cx="18" cy="14" r="3.2"/><path d="M9.2 13.5h5.6"/><path d="M2.8 13 4 9c.3-.9 1-1.5 2-1.5"/><path d="M21.2 13 20 9c-.3-.9-1-1.5-2-1.5"/></svg>`,
  falls: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 20h20L12 3z"/><path d="M12 10v4"/><circle cx="12" cy="17" r="0.6" fill="currentColor" stroke="none"/></svg>`,
  shower: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 15-4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/><rect x="6" y="9" width="12" height="4" rx="2"/><path d="M8 16v1M12 16v2M16 16v1"/></svg>`,
  heart: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.4-9.5-8.8C.8 8 2 4.5 5.4 3.7 8 3 10 4 12 6.5 14 4 16 3 18.6 3.7 22 4.5 23.2 8 21.5 11.2 19 15.6 12 20 12 20z"/></svg>`,
  clipboard: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><rect x="9" y="2.5" width="6" height="3.5" rx="1"/><path d="M8.5 11h7M8.5 14.5h7M8.5 18h4.5"/></svg>`,
};

const HEART_OUTLINE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px;opacity:0.6;"><path d="M12 20s-7-4.4-9.5-8.8C.8 8 2 4.5 5.4 3.7 8 3 10 4 12 6.5 14 4 16 3 18.6 3.7 22 4.5 23.2 8 21.5 11.2 19 15.6 12 20 12 20z"/></svg>`;

let residents = [];

document.getElementById('csvFile').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  Papa.parse(file, {
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      residents = results.data.filter(r => r['Resident Name'] && r['Resident Name'].trim() !== '');
      const statusEl = document.getElementById('loadStatus');
      if (residents.length === 0) {
        statusEl.textContent = 'No resident rows found. Check this is the Master sheet export.';
        statusEl.className = 'status err';
        return;
      }
      statusEl.textContent = `Loaded ${residents.length} residents.`;
      statusEl.className = 'status ok';
      populateWings();
    },
    error: function(err) {
      const statusEl = document.getElementById('loadStatus');
      statusEl.textContent = 'Could not read that file: ' + err.message;
      statusEl.className = 'status err';
    }
  });
});

function populateWings() {
  const wingSelect = document.getElementById('wingSelect');
  const wings = [...new Set(residents.map(r => r['Wing']).filter(Boolean))].sort();
  wingSelect.innerHTML = '<option value="">All wings</option>' + wings.map(w => `<option value="${w}">${w}</option>`).join('');
  wingSelect.disabled = false;
  wingSelect.onchange = populateResidents;
  populateResidents();
}

function populateResidents() {
  const wing = document.getElementById('wingSelect').value;
  const residentSelect = document.getElementById('residentSelect');
  const filtered = wing ? residents.filter(r => r['Wing'] === wing) : residents;
  residentSelect.innerHTML = filtered.map((r) => {
    const idx = residents.indexOf(r);
    return `<option value="${idx}">${r['Resident Name']}${r['Room'] ? ' (Room ' + r['Room'] + ')' : ''}</option>`;
  }).join('');
  residentSelect.disabled = false;
  residentSelect.onchange = renderPoster;
  document.getElementById('printBtn').disabled = false;
  renderPoster();
}

function yes(r, field) { return (r[field] || '').trim().toLowerCase() === 'yes'; }
function val(r, field) { return (r[field] || '').trim(); }

function renderPoster() {
  const idx = document.getElementById('residentSelect').value;
  if (idx === '' || idx === undefined) return;
  const r = residents[idx];

  const sections = [];

  let l = [];
  if (yes(r, 'Continence Aid')) l.push('Uses a continence aid');
  sections.push({ icon: ICONS.toilet, title: 'Toileting & Continence', color: 'blue', lines: l });

  l = [];
  if (yes(r, 'Glasses')) l.push('Glasses');
  if (yes(r, 'Upper Denture')) l.push('Upper denture');
  if (yes(r, 'Lower Denture')) l.push('Lower denture');
  if (yes(r, 'Hearing Aid Left')) l.push('Hearing aid (left)');
  if (yes(r, 'Hearing Aid Right')) l.push('Hearing aid (right)');
  if (yes(r, 'Walking Frame')) l.push('Walking frame');
  if (yes(r, 'Wheelchair')) l.push('Wheelchair');
  sections.push({ icon: ICONS.glasses, title: 'Aids & Equipment', color: 'lavender', lines: l });

  l = [];
  if (yes(r, 'High Falls Risk')) l.push('High falls risk');
  if (yes(r, 'Pressure Care')) l.push('Requires pressure care');
  if (val(r, 'Turning Schedule')) l.push('Turning schedule: ' + val(r, 'Turning Schedule'));
  if (yes(r, 'Hip Protectors')) l.push('Hip protectors');
  if (yes(r, 'Limb Protectors')) l.push('Limb protectors');
  sections.push({ icon: ICONS.falls, title: 'Falls & Skin Care', color: 'orange', lines: l });

  l = [];
  if (val(r, 'Shower Days')) l.push('Showers: ' + val(r, 'Shower Days'));
  if (val(r, 'Hair Wash Days')) l.push('Hair wash: ' + val(r, 'Hair Wash Days'));
  if (val(r, 'Shaving Days')) l.push('Shaving: ' + val(r, 'Shaving Days'));
  sections.push({ icon: ICONS.shower, title: 'Personal Care Routine', color: 'blue', lines: l });

  l = [];
  if (val(r, 'Behaviour Alert')) l.push('Alert: ' + val(r, 'Behaviour Alert'));
  if (val(r, 'Special Notes')) l.push('Note: ' + val(r, 'Special Notes'));
  sections.push({ icon: ICONS.heart, title: 'Behaviour Support', color: 'green', lines: l });

  l = [];
  if (val(r, 'Doctor')) l.push('Doctor: ' + val(r, 'Doctor'));
  if (val(r, 'NFR Status')) l.push(val(r, 'NFR Status'));
  if (val(r, 'Allergies')) l.push('Allergy: ' + val(r, 'Allergies'));
  if (yes(r, 'Physio Involved')) l.push('Physio involved');
  if (yes(r, 'Speech Pathology Involved')) l.push('Speech pathology involved');
  if (yes(r, 'Podiatry Involved')) l.push('Podiatry involved');
  sections.push({ icon: ICONS.clipboard, title: 'Important Information', color: 'orange', lines: l });

  const visibleSections = sections.filter(s => s.lines.length > 0);

  const cardsHtml = visibleSections.map(s => `
    <div class="card ${s.color}">
      <div class="icon-circle">${s.icon}</div>
      <div>
        <h3>${s.title}</h3>
        <ul>${s.lines.map(line => `<li>${escapeHtml(line)}</li>`).join('')}</ul>
      </div>
    </div>
  `).join('');

  const name = val(r, 'Resident Name');
  const preferred = val(r, 'Preferred Name');
  const room = val(r, 'Room');
  const wing = val(r, 'Wing');

  document.getElementById('poster-wrap').innerHTML = `
    <div class="poster">
      <div class="title-row"><h2>My Daily Needs</h2>${HEART_OUTLINE}</div>
      <div class="who">For: ${escapeHtml(name)}${preferred ? ' ("' + escapeHtml(preferred) + '")' : ''}
        ${room ? '&nbsp;&nbsp;Room: ' + escapeHtml(room) : ''}
        ${wing ? '&nbsp;&nbsp;Wing: ' + escapeHtml(wing) : ''}
      </div>
      <div class="ribbon">Thank you for supporting me</div>
      ${cardsHtml}
      <div class="footer-thanks">Thank you for your care and support!</div>
    </div>
  `;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
